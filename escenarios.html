  <link rel="stylesheet" href="css/estilos.css?v=6"/>
  <link rel="stylesheet" href="css/navbar.css?v=2"/>
  <style>
    body{overflow:auto;background:#fff}
    .esc-head{background:#fff;padding:16px 26px 4px}
    .esc-breadcrumb{font-size:13px;color:#3a6ea5}
    .esc-breadcrumb b{color:#2e6b3f}
    .esc-title{margin-top:8px;font-size:28px;font-weight:800;color:#2e6b3f}
    .esc-wrap{background:#eef5ea;padding:18px 26px 50px;flex:1}
    .cat-head{display:flex;align-items:center;gap:11px;max-width:1180px;margin:30px auto 16px;
      font-size:21px;font-weight:800;color:#333;border-bottom:2px solid #d6e3d2;padding-bottom:9px}
    .cat-ic{flex:none;display:inline-flex;align-items:center;line-height:0}
    .cat-ic svg{width:1.3em;height:1.3em}
    /* Formato Alcaldía de Girardota: icono grande + etiqueta en negrita mayúscula */
    .esc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1180px;margin:0 auto}
    .esc-card{background:#fff;border-radius:16px;padding:26px 16px 20px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.08);
      display:flex;flex-direction:column;align-items:center;gap:14px;border:2px solid transparent;transition:.16s;min-height:150px}
    .esc-card svg{width:66px;height:66px}
    .esc-card .esc-t{color:#3f4b5b;font-weight:800;font-size:12.5px;line-height:1.25;text-transform:uppercase;letter-spacing:.3px}
    a.esc-card{cursor:pointer;text-decoration:none}
    a.esc-card:hover{transform:translateY(-4px);box-shadow:0 12px 26px rgba(0,0,0,.16);border-color:#2e8b57}
    a.esc-card .esc-link{font-size:10px;color:#2e8b57;font-weight:700;text-transform:none;letter-spacing:0}
    @media(max-width:1000px){.esc-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:680px){.esc-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>

const wrap=document.getElementById('esc-wrap');
const SVG=(ic,color)=>`<svg viewBox="0 0 64 64" style="color:${color}" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">${ic}</svg>`;
CATS.forEach(C=>{
  const h=document.createElement('div'); h.className='cat-head';
  h.innerHTML=`<span class="cat-ic" style="color:${C.color}">${SVG(C.hi,C.color)}</span>${C.cat}`;
  wrap.appendChild(h);
  const g=document.createElement('div'); g.className='esc-grid';
  C.items.forEach(it=>{
    const inner=`${SVG(it.icon,C.color)}<div class="esc-t">${it.t}</div>`+(it.href?`<div class="esc-link">${it.sub?it.sub+' · ':''}Abrir ▸</div>`:'');
    let el;
    if(it.href){ el=document.createElement('a'); el.href=it.href; el.className='esc-card'; }
    else { el=document.createElement('div'); el.className='esc-card'; }
    el.innerHTML=inner; g.appendChild(el);
  });
  wrap.appendChild(g);
});
